<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JANTRA | Contact - Spatial Experience</title>
<!-- Tailwind CSS v3 CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration for Custom Animations -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 8s ease-in-out infinite 1s',
            'pulse-slow': 'pulse 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          }
        }
      }
    }
  </script>
<!-- BEGIN: Custom Styles -->
<style data-purpose="spatial-ui-effects">
    /* Glassmorphism base for VisionOS look */
    .glass-widget {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px 0 rgba(251, 146, 60, 0.15);
    }
    
    /* Smooth transition for hover interactions on spatial elements */
    .spatial-hover {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .spatial-hover:hover {
      transform: scale(1.02) translateY(-5px);
      background: rgba(255, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 40px 0 rgba(251, 146, 60, 0.25);
    }

    /* Globe placeholder shadow */
    .globe-shadow {
      filter: drop-shadow(0 0 50px rgba(251, 146, 60, 0.3));
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="bg-slate-50 min-h-screen overflow-hidden font-sans text-slate-900">
<!-- BEGIN: Ambient Background Background -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<!-- Large blurred radial orbs for depth -->
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-orange-200/40 blur-[150px] rounded-full animate-pulse-slow"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-100/30 blur-[150px] rounded-full"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-slate-50/50 backdrop-blur-[20px]"></div>
</div>
<!-- END: Ambient Background -->
<!-- BEGIN: Floating Navigation -->
<nav class="fixed top-8 left-1/2 -translate-x-1/2 z-50">
<div class="glass-widget px-8 py-3 rounded-full flex items-center space-x-8 text-sm font-medium tracking-wide">
<a class="hover:text-orange-600 transition-colors" href="#">Home</a>
<a class="hover:text-orange-600 transition-colors" href="#">Projects</a>
<div class="h-4 w-px bg-slate-300"></div>
<a class="text-orange-600" href="#">Contact</a>
<a class="hover:text-orange-600 transition-colors" href="#">About</a>
</div>
</nav>
<!-- END: Floating Navigation -->
<!-- BEGIN: Main Spatial Canvas -->
<main class="relative w-full h-screen flex items-center justify-center">
<!-- BEGIN: Central 3D Anchor (Globe Placeholder) -->
<section class="absolute inset-0 m-auto w-[50%] h-[600px] z-10 flex items-center justify-center pointer-events-none" data-purpose="globe-visual" id="central-anchor">
<!-- Stylized 3D Globe Placeholder -->
<div class="relative w-[500px] h-[500px] rounded-full border border-orange-200/30 globe-shadow animate-float flex items-center justify-center">
<!-- Inner glow/core -->
<div class="absolute inset-0 rounded-full bg-gradient-to-tr from-orange-100/20 to-transparent blur-xl"></div>
<!-- Placeholder for actual 3D rendering (e.g. Three.js) -->
<div class="text-center">
<svg class="w-64 h-64 text-orange-400 opacity-60" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" stroke-linecap="round" stroke-linejoin="round" stroke-width="0.5"></path>
</svg>
<p class="text-orange-500/50 text-xs mt-4 uppercase tracking-[0.3em]">Jantra Global Node</p>
</div>
</div>
</section>
<!-- END: Central 3D Anchor -->
<!-- BEGIN: Left Widget (Contact Form) -->
<section class="absolute left-[15%] top-[25%] w-[30%] min-w-[320px] max-w-[450px] z-20 glass-widget rounded-[2.5rem] p-10 spatial-hover animate-float" data-purpose="contact-input-panel" id="contact-form-widget">
<header class="mb-8">
<h1 class="text-3xl font-light tracking-tight text-slate-800">Send a <span class="font-semibold text-orange-500">Signal</span></h1>
<p class="text-slate-500 text-sm mt-2">We typically respond within 2 orbital cycles.</p>
</header>
<form action="#" class="space-y-6">
<div class="group">
<label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-1 ml-4">Identifier</label>
<input class="w-full bg-white/40 border-0 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-orange-300 placeholder:text-slate-400 text-sm transition-all" placeholder="Full Name" type="text"/>
</div>
<div class="group">
<label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-1 ml-4">Frequency</label>
<input class="w-full bg-white/40 border-0 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-orange-300 placeholder:text-slate-400 text-sm transition-all" placeholder="email@example.com" type="email"/>
</div>
<div class="group">
<label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-1 ml-4">Transmission</label>
<textarea class="w-full bg-white/40 border-0 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-orange-300 placeholder:text-slate-400 text-sm transition-all resize-none" placeholder="How can we help you navigate?" rows="4"></textarea>
</div>
<button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-medium tracking-wide hover:bg-orange-600 transition-all shadow-lg hover:shadow-orange-200/50 active:scale-95" type="submit">
          Dispatch
        </button>
</form>
</section>
<!-- END: Left Widget -->
<!-- BEGIN: Right Widget (Info Card) -->
<section class="absolute right-[15%] top-[40%] w-[25%] min-w-[280px] max-w-[380px] z-20 glass-widget rounded-[2.5rem] p-10 spatial-hover animate-float-delayed" data-purpose="info-panel" id="contact-info-widget">
<div class="space-y-10">
<!-- Brand Segment -->
<div>
<h2 class="text-xs uppercase tracking-[0.4em] text-orange-500 font-bold mb-4">Contact</h2>
<div class="space-y-4">
<div class="flex items-start group">
<div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center mr-4 text-orange-600">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<div>
<p class="text-[10px] text-slate-400 uppercase tracking-wider">Email</p>
<p class="text-sm font-medium text-slate-700">hello@jantra.io</p>
</div>
</div>
<div class="flex items-start group">
<div class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center mr-4 text-orange-600">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<div>
<p class="text-[10px] text-slate-400 uppercase tracking-wider">Voice</p>
<p class="text-sm font-medium text-slate-700">+1 (555) 890-JANTRA</p>
</div>
</div>
</div>
</div>
<!-- Location/Status Segment -->
<div class="pt-6 border-t border-white/30">
<h2 class="text-xs uppercase tracking-[0.4em] text-slate-400 font-bold mb-4">Location</h2>
<p class="text-sm text-slate-600 leading-relaxed italic">
            Remote First. <br/>
            Operating across Global Timezones.
          </p>
<div class="mt-6 flex items-center space-x-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
</span>
<span class="text-[10px] text-slate-500 uppercase tracking-widest">Active Now</span>
</div>
</div>
</div>
</section>
<!-- END: Right Widget -->
</main>
<!-- END: Main Spatial Canvas -->
<!-- BEGIN: Interaction Handling -->
<script data-purpose="spatial-tilt-effect">
    // Subtle mouse tracking to enhance the 3D depth effect
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 50;
      const y = (window.innerHeight / 2 - e.pageY) / 50;
      
      const anchor = document.getElementById('central-anchor');
      const widgetL = document.getElementById('contact-form-widget');
      const widgetR = document.getElementById('contact-info-widget');

      if(anchor) anchor.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
      if(widgetL) widgetL.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
      if(widgetR) widgetR.style.transform = `translate(${x * 2.5}px, ${y * 2.5}px)`;
    });
  </script>
<!-- END: Interaction Handling -->
</body></html>
