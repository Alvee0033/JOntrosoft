<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JANTRA | Spatial Checkout</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            jantra: {
              orange: '#FB923C',
              dark: '#1E293B'
            }
          },
          borderRadius: {
            '4xl': '2.5rem',
          }
        }
      }
    }
  </script>
<style data-purpose="spatial-ui-effects">
    /* Custom glassmorphism and depth effects */
    .glass-panel {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .orb-animate {
      animation: float 20s infinite alternate ease-in-out;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, -30px) scale(1.1); }
      100% { transform: translate(-20px, 40px) scale(0.9); }
    }

    .shimmer-orange {
      background: linear-gradient(135deg, #FB923C 0%, #F97316 100%);
      transition: all 0.3s ease;
    }

    .shimmer-orange:hover {
      box-shadow: 0 0 25px rgba(251, 146, 60, 0.4);
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen overflow-hidden font-sans text-slate-800">
<!-- BEGIN: Background Visuals -->
<div class="fixed inset-0 -z-50 overflow-hidden pointer-events-none" data-purpose="background-orbs">
<!-- Large blurred radial gradient orbs for VisionOS feel -->
<div class="orb-animate absolute top-[-10%] left-[-5%] w-[600px] h-[600px] bg-orange-200/40 rounded-full blur-[150px]"></div>
<div class="orb-animate absolute bottom-[10%] right-[-5%] w-[500px] h-[500px] bg-orange-100/30 rounded-full blur-[150px]" style="animation-delay: -5s;"></div>
<div class="orb-animate absolute top-[40%] left-[40%] w-[400px] h-[400px] bg-blue-100/20 rounded-full blur-[150px]" style="animation-delay: -10s;"></div>
</div>
<!-- END: Background Visuals -->
<!-- BEGIN: Navigation -->
<nav class="fixed top-8 left-1/2 -translate-x-1/2 z-50" data-purpose="floating-pill-nav">
<div class="glass-panel px-8 py-3 rounded-full flex items-center gap-8 shadow-lg">
<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-orange-500 rounded-md"></div>
<span class="font-bold tracking-tight text-slate-900 uppercase">JANTRA</span>
</div>
<div class="h-4 w-[1px] bg-slate-300"></div>
<div class="flex gap-6 text-sm font-medium text-slate-600">
<a class="hover:text-orange-500 transition-colors" href="#">Pricing</a>
<a class="hover:text-orange-500 transition-colors" href="#">Enterprise</a>
<a class="hover:text-orange-500 transition-colors" href="#">Support</a>
</div>
</div>
</nav>
<!-- END: Navigation -->
<!-- BEGIN: Main Content Area -->
<main class="relative w-full h-screen">
<!-- BEGIN: 3D Visual Anchor (Right Side) -->
<div class="absolute right-[10%] top-[15%] w-[40%] h-[700px] z-10 flex items-center justify-center" data-purpose="visual-anchor">
<!-- Placeholder for 3D Terminal/Lock -->
<div class="relative w-full h-full flex items-center justify-center">
<!-- Abstract representation of a security lock/terminal -->
<div class="w-80 h-[500px] bg-slate-200/50 rounded-3xl border border-white/40 shadow-2xl relative overflow-hidden flex flex-col items-center justify-center">
<!-- Inner Glow -->
<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-orange-100/20 to-transparent"></div>
<!-- Minimalist "Lock" Icon Representative -->
<div class="w-24 h-24 rounded-full border-4 border-white/80 flex items-center justify-center mb-8">
<div class="w-12 h-16 bg-white/40 rounded-lg relative">
<div class="absolute top-[-20px] left-1/2 -translate-x-1/2 w-8 h-10 border-4 border-white/40 border-b-0 rounded-t-full"></div>
</div>
</div>
<div class="text-slate-400 text-xs font-mono tracking-widest uppercase">Encrypted Core</div>
</div>
<!-- Floating decorative elements to enhance 3D feel -->
<div class="absolute top-20 right-10 w-24 h-24 glass-panel rounded-2xl rotate-12 blur-[2px] opacity-60"></div>
<div class="absolute bottom-40 left-0 w-32 h-32 glass-panel rounded-full -rotate-12 blur-[1px] opacity-40"></div>
</div>
</div>
<!-- END: 3D Visual Anchor -->
<!-- BEGIN: Spatial Interface (Left Side) -->
<section class="absolute left-[10%] top-[20%] w-[45%] z-20 glass-panel p-12 shadow-[0_8px_32px_0_rgba(251,146,60,0.15)] rounded-4xl" data-purpose="checkout-interface">
<header class="mb-10">
<h1 class="text-4xl font-semibold text-slate-900 mb-2 tracking-tight">Checkout</h1>
<p class="text-slate-500">Secure your spatial workspace environment.</p>
</header>
<!-- Checkout Form Steps -->
<div class="space-y-8">
<!-- Plan Summary -->
<div class="flex items-center justify-between border-b border-white/30 pb-6">
<div data-purpose="product-info">
<h3 class="text-lg font-medium text-slate-800">Pro Enterprise Plan</h3>
<p class="text-sm text-slate-500">Annual billing (save 20%)</p>
</div>
<div class="text-right">
<span class="text-2xl font-bold text-slate-900">$2,400</span>
<span class="block text-xs text-slate-400">USD / Year</span>
</div>
</div>
<!-- Payment Details Placeholder -->
<div class="space-y-4">
<label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Payment Method</label>
<div class="grid grid-cols-2 gap-4">
<div class="p-4 bg-white/40 border border-white/60 rounded-2xl flex items-center gap-3 cursor-pointer hover:bg-white/60 transition-colors">
<div class="w-8 h-5 bg-slate-800 rounded-sm"></div>
<span class="text-sm font-medium">•••• 4242</span>
</div>
<div class="p-4 bg-transparent border border-white/40 border-dashed rounded-2xl flex items-center justify-center gap-2 cursor-pointer hover:bg-white/20 transition-colors">
<span class="text-sm text-slate-500">+ Add New</span>
</div>
</div>
</div>
<!-- Security Badge -->
<div class="flex items-center gap-3 py-4 px-5 bg-white/10 rounded-2xl">
<svg class="w-5 h-5 text-orange-400" fill="currentColor" viewbox="0 0 20 20">
<path clip-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path>
</svg>
<span class="text-xs text-slate-600 font-medium">Bank-level 256-bit encryption active</span>
</div>
<!-- Action Button -->
<button class="w-full py-5 rounded-2xl shimmer-orange text-white font-bold text-lg shadow-xl" data-purpose="pay-button">
          Pay $2,400.00
        </button>
<p class="text-center text-xs text-slate-400">
          By clicking pay, you agree to JANTRA's <a class="underline" href="#">Terms of Service</a>.
        </p>
</div>
</section>
<!-- END: Spatial Interface -->
</main>
<!-- END: Main Content Area -->
</body></html>
