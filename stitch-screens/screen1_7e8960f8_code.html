<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JANTRA - Enterprise Software, Reimagined</title>
<!-- Tailwind CSS v3 with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- BEGIN: Custom Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float-slow': 'float 8s ease-in-out infinite',
            'float-medium': 'float 6s ease-in-out infinite',
            'float-fast': 'float 4s ease-in-out infinite',
            'spin-slow': 'spin 12s linear infinite',
            'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: 0.4 },
              '50%': { opacity: 0.7 },
            }
          }
        }
      }
    }
  </script>
<!-- END: Custom Configuration -->
<style data-purpose="vision-os-effects">
    /* Subtle glassmorphism refinements */
    .glass-panel {
      box-shadow: 
        0 8px 32px 0 rgba(251, 146, 60, 0.15),
        inset 0 0 0 1px rgba(255, 255, 255, 0.4);
    }
    
    /* Background Orb Positioning */
    .orb-1 { top: -10%; left: -10%; }
    .orb-2 { bottom: -10%; right: -5%; }
    .orb-3 { top: 20%; right: 20%; }
  </style>
</head>
<body class="bg-slate-50 overflow-hidden selection:bg-orange-200">
<!-- BEGIN: Continuous Background -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none" data-purpose="dynamic-background">
<div class="orb-1 absolute w-[600px] h-[600px] bg-orange-200/40 rounded-full blur-[150px] animate-pulse-soft"></div>
<div class="orb-2 absolute w-[800px] h-[800px] bg-blue-100/30 rounded-full blur-[150px] animate-float-slow"></div>
<div class="orb-3 absolute w-[400px] h-[400px] bg-orange-100/20 rounded-full blur-[100px] animate-float-medium"></div>
</div>
<!-- END: Continuous Background -->
<!-- BEGIN: Floating Navigation -->
<nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[80%] max-w-5xl bg-white/30 backdrop-blur-2xl border border-white/40 shadow-xl rounded-full px-8 py-4 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-gradient-to-tr from-orange-500 to-orange-400 rounded-lg"></div>
<span class="text-xl font-bold tracking-tight text-slate-900">JANTRA</span>
</div>
<div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-600">
<a class="hover:text-orange-600 transition-colors" href="#">Products</a>
<a class="hover:text-orange-600 transition-colors" href="#">Solutions</a>
<a class="hover:text-orange-600 transition-colors" href="#">Ecosystem</a>
<a class="hover:text-orange-600 transition-colors" href="#">Support</a>
</div>
<button class="bg-slate-900 text-white px-6 py-2 rounded-full text-sm font-semibold hover:bg-slate-800 transition-all active:scale-95">
      Launch App
    </button>
</nav>
<!-- END: Floating Navigation -->
<!-- BEGIN: Hero Section -->
<main class="relative h-screen w-full flex items-center">
<!-- BEGIN: 3D Anchor Placeholder -->
<section class="absolute right-[5%] top-[15%] w-[55%] h-[80%] z-10 flex items-center justify-center" data-purpose="3d-visual-container">
<!-- Simulated 3D Isometric Animation -->
<div class="relative w-full h-full flex items-center justify-center animate-float-slow">
<!-- Central Cube Structure -->
<div class="relative w-64 h-64 bg-white/40 backdrop-blur-md border border-white/60 shadow-2xl rounded-[3rem] rotate-45 flex items-center justify-center">
<div class="w-32 h-32 bg-gradient-to-br from-orange-400 to-orange-600 rounded-2xl shadow-inner animate-spin-slow"></div>
</div>
<!-- Floating Nodes Around Object -->
<!-- Node 1 -->
<div class="absolute top-1/4 left-1/4 w-16 h-16 bg-white/40 backdrop-blur-xl rounded-full border border-white/60 shadow-lg flex items-center justify-center animate-float-fast z-30">
<div class="w-3 h-3 bg-orange-500 rounded-full"></div>
</div>
<!-- Node 2 -->
<div class="absolute bottom-1/3 right-1/4 w-20 h-20 bg-white/30 backdrop-blur-xl rounded-full border border-white/60 shadow-lg flex items-center justify-center animate-float-medium z-30">
<div class="w-4 h-4 bg-orange-400 rounded-full opacity-60"></div>
</div>
<!-- Node 3 -->
<div class="absolute top-1/2 -right-4 w-12 h-12 bg-white/50 backdrop-blur-xl rounded-full border border-white/60 shadow-lg flex items-center justify-center animate-float-slow z-30">
<div class="w-2 h-2 bg-orange-600 rounded-full"></div>
</div>
</div>
</section>
<!-- END: 3D Anchor Placeholder -->
<!-- BEGIN: Glass Interface -->
<section class="absolute left-[10%] top-[25%] w-[40%] z-20 glass-panel bg-white/20 backdrop-blur-[40px] border border-white/50 rounded-[2.5rem] p-12 md:p-16" data-purpose="content-interface">
<div class="space-y-8">
<header>
<span class="inline-block px-4 py-1.5 rounded-full bg-orange-500/10 text-orange-600 text-xs font-bold tracking-widest uppercase mb-6">
            Future of Work
          </span>
<h1 class="text-6xl font-bold text-slate-900 leading-[1.1] tracking-tight">
            Enterprise Software, <br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-orange-400">Reimagined.</span>
</h1>
</header>
<p class="text-xl text-slate-600 leading-relaxed max-w-md">
          Experience the next generation of spatial computing for business. Modular, intuitive, and designed for the visionaries of tomorrow.
        </p>
<div class="flex items-center gap-4 pt-4">
<button class="px-8 py-4 bg-gradient-to-r from-orange-500 to-orange-600 text-white font-bold rounded-full shadow-[0_10px_20px_-5px_rgba(249,115,22,0.4)] hover:shadow-[0_15px_25px_-5px_rgba(249,115,22,0.5)] transition-all active:scale-95">
            Get Started
          </button>
<button class="px-8 py-4 bg-white/50 hover:bg-white/80 text-slate-800 font-semibold rounded-full transition-all border border-white/40">
            View Demo
          </button>
</div>
</div>
<!-- Detail elements inside glass -->
<div class="mt-12 flex items-center gap-6 border-t border-white/20 pt-8">
<div class="flex -space-x-3">
<div class="w-10 h-10 rounded-full border-2 border-white bg-slate-200"></div>
<div class="w-10 h-10 rounded-full border-2 border-white bg-slate-300"></div>
<div class="w-10 h-10 rounded-full border-2 border-white bg-slate-400"></div>
</div>
<p class="text-sm text-slate-500 font-medium">Joined by 2,000+ companies</p>
</div>
</section>
<!-- END: Glass Interface -->
</main>
<!-- END: Hero Section -->
</body></html>
